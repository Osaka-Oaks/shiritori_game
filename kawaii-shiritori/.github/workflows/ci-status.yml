name: CI - Overall Status

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  detect-changes:
    name: Detect Package Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      ui: ${{ steps.filter.outputs.ui }}
      firebase: ${{ steps.filter.outputs.firebase }}
      game2d: ${{ steps.filter.outputs.game2d }}
      shared: ${{ steps.filter.outputs.shared }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
            ui:
              - 'packages/ui/**'
            firebase:
              - 'packages/firebase/**'
            game2d:
              - 'packages/game-2d/**'
            shared:
              - 'packages/shared/**'
            app:
              - 'packages/app/**'

  status-dashboard:
    name: Generate Status Dashboard
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - name: 📊 Create Status Report
        run: |
          echo "# 📊 Package Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Changed Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.detect-changes.outputs.core }}" == "true" ]; then
            echo "- ✅ **@shiritori/core** - Core game logic" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.detect-changes.outputs.ui }}" == "true" ]; then
            echo "- ✅ **@shiritori/ui** - React components" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.detect-changes.outputs.firebase }}" == "true" ]; then
            echo "- ✅ **@shiritori/firebase** - Firebase services" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.detect-changes.outputs.game2d }}" == "true" ]; then
            echo "- ✅ **@shiritori/game-2d** - 2D platformer" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.detect-changes.outputs.shared }}" == "true" ]; then
            echo "- ✅ **@shiritori/shared** - Shared utilities" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.detect-changes.outputs.app }}" == "true" ]; then
            echo "- ✅ **@shiritori/app** - Main application" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## CI Workflows Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Only changed packages will run their CI workflows. This saves time and resources!" >> $GITHUB_STEP_SUMMARY

  all-tests-passed:
    name: All Tests Status
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: always()
    steps:
      - name: Check overall status
        run: |
          echo "🎯 All module tests completed"
          echo "Check individual workflow runs for detailed results"
