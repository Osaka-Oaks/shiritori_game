name: CI - Core Package

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/core/**"
      - "packages/shared/**"
      - ".github/workflows/ci-core.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/core/**"
      - "packages/shared/**"
      - ".github/workflows/ci-core.yml"

jobs:
  test:
    name: Test Core Package
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type check
        run: pnpm --filter @shiritori/core typecheck

      - name: 🎨 Lint code
        run: pnpm --filter @shiritori/core lint

      - name: 🧪 Run tests
        run: pnpm --filter @shiritori/core test

      - name: 📊 Generate coverage
        run: pnpm --filter @shiritori/core test:coverage

      - name: 📤 Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./packages/core/coverage/coverage-final.json
          flags: core
          name: core-coverage

      - name: 🏗️ Build package
        run: pnpm --filter @shiritori/core build

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: core-dist
          path: packages/core/dist/
          retention-days: 7

  status:
    name: Core Package Status
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: ✅ Success
        if: needs.test.result == 'success'
        run: |
          echo "::notice::✅ Core package tests passed!"
          echo "MODULE=core" >> $GITHUB_ENV
          echo "STATUS=success" >> $GITHUB_ENV

      - name: ❌ Failure
        if: needs.test.result != 'success'
        run: |
          echo "::error::❌ Core package tests failed!"
          echo "MODULE=core" >> $GITHUB_ENV
          echo "STATUS=failure" >> $GITHUB_ENV
          exit 1
