name: CI - Firebase Package

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/firebase/**"
      - "packages/shared/**"
      - ".github/workflows/ci-firebase.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/firebase/**"
      - "packages/shared/**"

jobs:
  test:
    name: Test Firebase Package
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: 📚 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build dependencies (shared)
        run: pnpm --filter @shiritori/shared build

      - name: 🔍 Type check
        run: pnpm --filter @shiritori/firebase typecheck

      - name: 🎨 Lint code
        run: pnpm --filter @shiritori/firebase lint

      - name: 🧪 Run tests
        run: pnpm --filter @shiritori/firebase test

      - name: 📊 Generate coverage
        run: pnpm --filter @shiritori/firebase test:coverage

      - name: 📤 Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./packages/firebase/coverage/coverage-final.json
          flags: firebase
          name: firebase-coverage

      - name: 🏗️ Build package
        run: pnpm --filter @shiritori/firebase build

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firebase-dist
          path: packages/firebase/dist/
          retention-days: 7

  status:
    name: Firebase Package Status
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: ✅ Success
        if: needs.test.result == 'success'
        run: |
          echo "::notice::✅ Firebase package tests passed!"
          echo "MODULE=firebase" >> $GITHUB_ENV
          echo "STATUS=success" >> $GITHUB_ENV

      - name: ❌ Failure
        if: needs.test.result != 'success'
        run: |
          echo "::error::❌ Firebase package tests failed!"
          echo "MODULE=firebase" >> $GITHUB_ENV
          echo "STATUS=failure" >> $GITHUB_ENV
          exit 1
