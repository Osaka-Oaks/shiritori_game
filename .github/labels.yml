# Canonical label set — synced to GitHub by .github/workflows/labels.yml.
# Edit here, push to main, and the repo's labels update automatically.

# ── Type ─────────────────────────────
- name: "type: bug"
  color: "d73a4a"
  description: Something isn't working
- name: "type: feature"
  color: "0e8a16"
  description: New feature or request
- name: "type: chore"
  color: "fef2c0"
  description: Refactor, tooling, or maintenance
- name: "type: docs"
  color: "0075ca"
  description: Documentation

# ── Status ───────────────────────────
- name: "status: triage"
  color: "ededed"
  description: Needs review / prioritization
- name: "status: in progress"
  color: "fbca04"
  description: Actively being worked on
- name: "status: blocked"
  color: "b60205"
  description: Blocked by something else
- name: "status: ready"
  color: "0e8a16"
  description: Ready to work / merge

# ── Priority ─────────────────────────
- name: "priority: high"
  color: "b60205"
- name: "priority: medium"
  color: "fbca04"
- name: "priority: low"
  color: "c2e0c6"

# ── Area (auto-applied by path) ──────
- name: "area: shiritori-online"
  color: "1d76db"
- name: "area: kawaii-shiritori"
  color: "5319e7"
- name: "area: ci/cd"
  color: "0052cc"
- name: "area: dictionary"
  color: "006b75"
- name: "dependencies"
  color: "0366d6"
  description: Dependency updates
