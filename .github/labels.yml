# Canonical label set — synced to GitHub by .github/workflows/labels.yml.
# Edit here, push to main, and the repo's labels update automatically.

# ── Type ─────────────────────────────
- name: "type: bug"
  color: "d73a4a"
  description: Something isn't working
- name: "type: feature"
  color: "0e8a16"
  description: New feature or request
- name: "type: chore"
  color: "fef2c0"
  description: Refactor, tooling, or maintenance
- name: "type: docs"
  color: "0075ca"
  description: Documentation

# ── Status ───────────────────────────
- name: "status: triage"
  color: "ededed"
  description: Needs review / prioritization
- name: "status: in progress"
  color: "fbca04"
  description: Actively being worked on
- name: "status: blocked"
  color: "b60205"
  description: Blocked by something else
- name: "status: ready"
  color: "0e8a16"
  description: Ready to work / merge
- name: "status: backlog"
  color: "d4d4d4"
  description: Backlog — not started
- name: "status: review"
  color: "c5def5"
  description: In code review
- name: "status: done"
  color: "1d76db"
  description: Completed / shipped
- name: "status: stale"
  color: "ffffff"
  description: Inactive — may be closed soon

# ── Priority ─────────────────────────
- name: "priority: high"
  color: "b60205"
- name: "priority: medium"
  color: "fbca04"
- name: "priority: low"
  color: "c2e0c6"

# ── Area (auto-applied by path) ──────
- name: "area: shiritori-online"
  color: "1d76db"
- name: "area: kawaii-shiritori"
  color: "5319e7"
- name: "area: ci/cd"
  color: "0052cc"
- name: "area: dictionary"
  color: "006b75"
- name: "area: flutter"
  color: "e99695"
  description: shiritori_flutter (Dart / Flutter)
- name: "area: infra"
  color: "5319e7"
  description: Terraform / OpenTofu / cloud IaC
- name: "dependencies"
  color: "0366d6"
  description: Dependency updates

# ── GitHub Actions / automation ─────
- name: "action: ci"
  color: "bfd4f2"
  description: CI pipeline run or failure
- name: "action: deploy"
  color: "f9d0c4"
  description: Deployment related
- name: "action: security"
  color: "e99695"
  description: Security scan or audit
- name: "action: cron"
  color: "d876e3"
  description: Scheduled / cron job
- name: "action: uptime"
  color: "f9c513"
  description: Uptime / health monitor

# ── Game features ───────────────────
- name: "game: solo"
  color: "84b6eb"
  description: Single-player / vs CPU mode
- name: "game: multiplayer"
  color: "7057ff"
  description: Online two-player mode
- name: "game: levels"
  color: "2ea043"
  description: Difficulty levels / progression
- name: "game: dev-tools"
  color: "a2eeef"
  description: In-app dev / test tools
