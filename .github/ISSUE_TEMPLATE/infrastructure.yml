name: 🏗️ Infrastructure
description: Terraform / OpenTofu — cloud resources, modules, state
title: "[Infra]: "
labels: ["area: infra", "status: triage"]
body:
  - type: dropdown
    id: iac_tool
    attributes:
      label: IaC tool
      options:
        - Terraform (infra/terraform/)
        - OpenTofu (infra/opentofu/)
        - Both (keep in sync)
        - Firebase / hosting only
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - dev
        - staging
        - production
    validations:
      required: true

  - type: textarea
    id: change
    attributes:
      label: What to change
      description: Resources to create, update, or destroy. Link module paths if applicable.
      placeholder: |
        - Add GCS bucket for Flutter web artifacts
        - Module: infra/terraform/modules/hosting
    validations:
      required: true

  - type: input
    id: module_path
    attributes:
      label: Module path (optional)
      placeholder: infra/terraform/modules/example

  - type: textarea
    id: variables
    attributes:
      label: New variables / secrets (names only — no values)
      placeholder: |
        TF_VAR_project_id (from GitHub Actions secret)
        backend bucket name

  - type: textarea
    id: plan
    attributes:
      label: Plan output (after terraform plan / tofu plan)
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: terraform fmt / tofu fmt run
        - label: terraform validate / tofu validate pass
        - label: Remote state backend configured
        - label: No secrets committed in .tf files
        - label: README updated in infra/
