name: Dependency Monitor

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Manual trigger
  push:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - ".github/workflows/deps-monitor.yml"

jobs:
  report:
    name: Generate Dependency Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install app dependencies
        run: |
          npm run install:app || true
          npm run install:kawaii || true

      - name: Generate dependency report
        run: npm run deps:report

      - name: Check for outdated packages
        run: |
          echo "## Outdated Packages Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Shiritori Online" >> $GITHUB_STEP_SUMMARY
          npm --prefix shiritori-online outdated --json > online-outdated.json || true

          echo "### Kawaii Shiritori" >> $GITHUB_STEP_SUMMARY
          npm --prefix kawaii-shiritori outdated --json > kawaii-outdated.json || true

          node scripts/format-outdated.mjs >> $GITHUB_STEP_SUMMARY || true

      - name: Check version mismatches
        run: |
          echo "## Version Mismatches" >> $GITHUB_STEP_SUMMARY
          npm run deps:sync >> $GITHUB_STEP_SUMMARY || echo "No mismatches found" >> $GITHUB_STEP_SUMMARY

      - name: Security audit
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Shiritori Online" >> $GITHUB_STEP_SUMMARY
          npm --prefix shiritori-online audit --json > online-audit.json || true

          echo "### Kawaii Shiritori" >> $GITHUB_STEP_SUMMARY
          npm --prefix kawaii-shiritori audit --json > kawaii-audit.json || true

          node scripts/format-audit.mjs >> $GITHUB_STEP_SUMMARY || true

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            *-outdated.json
            *-audit.json
          retention-days: 30

  notify-outdated:
    name: Create Issue for Major Updates
    runs-on: ubuntu-latest
    needs: report
    if: github.event_name == 'schedule' # Only on scheduled runs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install
          npm run install:app || true
          npm run install:kawaii || true

      - name: Check for major updates
        id: check
        run: |
          HAS_MAJOR=false

          # Check shiritori-online
          npm --prefix shiritori-online outdated --json > online.json || true
          if grep -q "major" online.json 2>/dev/null; then
            HAS_MAJOR=true
          fi

          # Check kawaii-shiritori
          npm --prefix kawaii-shiritori outdated --json > kawaii.json || true
          if grep -q "major" kawaii.json 2>/dev/null; then
            HAS_MAJOR=true
          fi

          echo "has_major=$HAS_MAJOR" >> $GITHUB_OUTPUT

      - name: Create or update issue
        if: steps.check.outputs.has_major == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔄 Major Dependency Updates Available';
            const label = 'dependencies';

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            const body = `## 🔄 Major Dependency Updates Available

            Automated weekly scan detected major version updates for dependencies.

            ### Action Required

            1. Review the [dependency report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. Check breaking changes in changelogs
            3. Update dependencies incrementally
            4. Run tests after each update

            ### Commands

            \`\`\`bash
            # Check outdated packages
            npm run deps:outdated

            # Check version mismatches
            npm run deps:sync

            # Generate full report
            npm run deps:report
            \`\`\`

            ---

            *This issue is automatically created by the Dependency Monitor workflow.*
            *Last updated: ${new Date().toISOString()}*
            `;

            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
              
              // Add comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔔 New scan completed. Major updates still available. [View latest report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: [label, 'enhancement']
              });
            }
