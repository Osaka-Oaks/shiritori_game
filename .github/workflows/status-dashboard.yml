name: Status Dashboard

# Real-time status dashboard - runs frequently
on:
  push:
    branches: [main, develop, 'feature/**']
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  statuses: read

jobs:
  generate-dashboard:
    name: 📊 Generate Status Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate comprehensive dashboard
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const fs = require('fs');
            
            // Get all branches
            const { data: branches } = await github.rest.repos.listBranches({
              owner,
              repo,
              per_page: 100
            });
            
            // Get workflows
            const { data: workflows } = await github.rest.actions.listRepoWorkflows({
              owner,
              repo
            });
            
            // Get recent workflow runs
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 50
            });
            
            // Calculate success rate
            const successRate = (runs.workflow_runs.filter(r => r.conclusion === 'success').length / runs.workflow_runs.length * 100).toFixed(1);
            
            // Get open issues and PRs
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });
            
            const bugs = issues.filter(i => !i.pull_request && i.labels.some(l => l.name === 'bug')).length;
            const features = issues.filter(i => !i.pull_request && i.labels.some(l => l.name === 'feature')).length;
            const prs = issues.filter(i => i.pull_request).length;
            
            // Get deployment status
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner,
              repo,
              per_page: 10
            });
            
            const latestDeploy = deployments[0];
            let deployStatus = 'N/A';
            if (latestDeploy) {
              const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                owner,
                repo,
                deployment_id: latestDeploy.id
              });
              deployStatus = statuses[0]?.state || 'unknown';
            }
            
            // Get commit activity
            const { data: commits } = await github.rest.repos.listCommits({
              owner,
              repo,
              per_page: 100
            });
            
            const last24h = commits.filter(c => {
              const date = new Date(c.commit.author.date);
              return Date.now() - date.getTime() < 24 * 60 * 60 * 1000;
            }).length;
            
            // Build dashboard
            const dashboard = `# 📊 Project Status Dashboard
            
            > Last updated: ${new Date().toUTCString()}
            
            ## 🎯 Overall Health
            
            | Metric | Status | Value |
            |--------|--------|-------|
            | **Build Success Rate** | ${successRate > 90 ? '🟢' : successRate > 70 ? '🟡' : '🔴'} | ${successRate}% |
            | **Open Issues** | ${issues.length - prs < 10 ? '🟢' : issues.length - prs < 30 ? '🟡' : '🔴'} | ${issues.length - prs} |
            | **Open PRs** | ${prs < 5 ? '🟢' : prs < 10 ? '🟡' : '🔴'} | ${prs} |
            | **Latest Deployment** | ${deployStatus === 'success' ? '🟢' : deployStatus === 'pending' ? '🟡' : '🔴'} | ${deployStatus} |
            | **Commits (24h)** | ${last24h > 5 ? '🟢' : last24h > 0 ? '🟡' : '⚪'} | ${last24h} |
            
            ## 🌿 Branch Status
            
            | Branch | Commits | Status | Last Update |
            |--------|---------|--------|-------------|
            ${await Promise.all(branches.slice(0, 10).map(async b => {
              const { data: status } = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: b.name
              }).catch(() => ({ data: { state: 'none' } }));
              
              const { data: commit } = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: b.commit.sha
              });
              
              const statusIcon = status.state === 'success' ? '✅' : 
                                status.state === 'pending' ? '🔄' : 
                                status.state === 'failure' ? '❌' : '⚪';
              
              const date = new Date(commit.commit.author.date);
              const daysAgo = Math.floor((Date.now() - date.getTime()) / (24 * 60 * 60 * 1000));
              
              return `| \`${b.name}\` | ${commit.commit.message.split('\n')[0].substring(0, 40)} | ${statusIcon} | ${daysAgo}d ago |`;
            })).then(rows => rows.join('\n'))}
            
            ## 🎯 Active Work
            
            ### Open Issues by Type
            - 🐛 **Bugs**: ${bugs}
            - ✨ **Features**: ${features}
            - 📋 **Other**: ${issues.length - prs - bugs - features}
            
            ### Pull Requests
            ${prs > 0 ? `
            ${issues.filter(i => i.pull_request).slice(0, 5).map(pr => 
              `- #${pr.number} - ${pr.title}`
            ).join('\n')}
            ${prs > 5 ? `\n*...and ${prs - 5} more*` : ''}
            ` : '_No open pull requests_'}
            
            ## 📈 Recent Activity
            
            ### Top Contributors (Last 100 commits)
            ${Array.from(commits.reduce((map, c) => {
              const author = c.commit.author.name;
              map.set(author, (map.get(author) || 0) + 1);
              return map;
            }, new Map()))
              .sort((a, b) => b[1] - a[1])
              .slice(0, 5)
              .map(([author, count], i) => `${i + 1}. **${author}** - ${count} commits`)
              .join('\n')}
            
            ### Workflow Status
            ${workflows.workflows.slice(0, 5).map(w => {
              const recentRun = runs.workflow_runs.find(r => r.workflow_id === w.id);
              const status = recentRun?.conclusion === 'success' ? '✅' :
                            recentRun?.conclusion === 'failure' ? '❌' :
                            recentRun?.status === 'in_progress' ? '🔄' : '⚪';
              return `- ${status} **${w.name}**`;
            }).join('\n')}
            
            ## 🚀 Deployment History
            
            | Environment | Status | Time | SHA |
            |-------------|--------|------|-----|
            ${deployments.slice(0, 5).map(d => {
              const env = d.environment || 'unknown';
              const time = new Date(d.created_at).toLocaleString();
              const sha = d.sha.substring(0, 7);
              return `| ${env} | ${deployStatus} | ${time} | \`${sha}\` |`;
            }).join('\n') || '| - | No deployments | - | - |'}
            
            ## 🔗 Quick Links
            
            - [🎯 View Issues](https://github.com/${owner}/${repo}/issues)
            - [🔀 View Pull Requests](https://github.com/${owner}/${repo}/pulls)
            - [⚙️ View Actions](https://github.com/${owner}/${repo}/actions)
            - [📊 View Insights](https://github.com/${owner}/${repo}/pulse)
            - [🚀 View Deployments](https://github.com/${owner}/${repo}/deployments)
            
            ---
            
            _Auto-generated every 6 hours • [Refresh](https://github.com/${owner}/${repo}/actions/workflows/status-dashboard.yml)_
            `;
            
            // Write to file
            fs.writeFileSync('STATUS.md', dashboard);
            console.log('Dashboard generated');

      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add STATUS.md
          if git diff --staged --quiet; then
            echo "No changes to dashboard"
          else
            git commit -m "chore: update status dashboard [skip ci]"
            git push
          fi

      - name: Create summary
        run: |
          echo "## 📊 Dashboard Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the dashboard: [STATUS.md](https://github.com/${{ github.repository }}/blob/main/STATUS.md)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard updates every 6 hours automatically." >> $GITHUB_STEP_SUMMARY
