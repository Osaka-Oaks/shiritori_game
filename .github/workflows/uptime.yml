name: Uptime monitor

# Cron job: pings the live site every 15 minutes and opens/updates an issue
# if it's down or serving a broken page — an early warning for uptime.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check homepage responds and renders
        id: check
        run: |
          URL="https://shiritori-game-ccaae.web.app/"
          code=$(curl -s -o body.html -w "%{http_code}" --max-time 20 "$URL" || echo "000")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "status=down" >> "$GITHUB_OUTPUT"
            echo "detail=HTTP $code" >> "$GITHUB_OUTPUT"
          elif ! grep -q "しりとり" body.html; then
            echo "status=broken" >> "$GITHUB_OUTPUT"
            echo "detail=Page loaded but content missing" >> "$GITHUB_OUTPUT"
          else
            echo "status=up" >> "$GITHUB_OUTPUT"
          fi

      - name: Open incident issue if down
        if: steps.check.outputs.status != 'up'
        uses: actions/github-script@v7
        with:
          script: |
            const detail = "${{ steps.check.outputs.detail }}";
            const title = "🚨 Uptime: site is down";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "type: bug,priority: high",
            });
            const existing = issues.find(i => i.title === title);
            const body = `Automated uptime check failed at ${new Date().toISOString()}\n\n${detail}\n\nURL: https://shiritori-game-ccaae.web.app/`;
            if (existing) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ["type: bug", "priority: high"] });
            }
