name: Security

# CodeQL weekly + dependency review. Fast scans run in ci.yml.
on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  audit:
    name: npm audit — ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [shiritori-online, kawaii-shiritori]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Critical vulnerabilities — production deps (blocking)
        working-directory: ${{ matrix.app }}
        run: npm audit --omit=dev --audit-level=critical

      - name: Full audit report (includes devDependencies)
        working-directory: ${{ matrix.app }}
        continue-on-error: true
        run: |
          npm audit --audit-level=high --json > audit-report.json || true
          node -e "
            const r=require('./audit-report.json');
            const v=r.metadata?.vulnerabilities||{};
            console.log('critical:', v.critical||0, 'high:', v.high||0, 'moderate:', v.moderate||0);
          "

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.app }}
          path: ${{ matrix.app }}/audit-report.json
          retention-days: 30
          if-no-files-found: ignore

  secret-scan:
    name: Secret scan (Gitleaks)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  rules-check:
    name: Firebase rules validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate RTDB rules JSON
        run: node -e "JSON.parse(require('fs').readFileSync('shiritori-online/database.rules.json','utf8'))"

      - name: Validate Firestore indexes JSON
        run: node -e "JSON.parse(require('fs').readFileSync('kawaii-shiritori/firestore.indexes.json','utf8'))"

      - name: Firestore rules header
        run: grep -q rules_version kawaii-shiritori/firestore.rules
