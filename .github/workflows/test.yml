name: Tests

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install kawaii-shiritori dependencies
        run: npm run install:kawaii
      
      - name: Run lint
        run: npm run lint
      
      - name: Run tests with coverage
        run: npm --prefix kawaii-shiritori run test:coverage
      
      - name: Generate JUnit report
        run: npm run test:junit
      
      - name: Upload test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/test-results/junit.xml
          check_name: Test Results
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./kawaii-shiritori/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Comment test results on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read test results if available
            let testResults = 'Test results not available';
            try {
              const resultsPath = path.join(process.env.GITHUB_WORKSPACE, 'kawaii-shiritori/test-results/junit.xml');
              if (fs.existsSync(resultsPath)) {
                testResults = '✅ Tests completed successfully';
              }
            } catch (error) {
              console.log('Could not read test results:', error);
            }
            
            const comment = `## 🧪 Test Results\n\n${testResults}\n\nView full results in the Actions tab.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
