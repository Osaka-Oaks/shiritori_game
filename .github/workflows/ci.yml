name: CI

# Branches: main (prod), develop (preview), feature/* & fix/* (validate only)
# Pipeline: changes → format → lint → security → test → build → deploy → smoke
on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment (manual runs only)"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - staging
          - production

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "20"
  FIREBASE_PROJECT: shiritori-game-ccaae
  LIVE_URL: https://shiritori-game-ccaae.web.app
  # Deployment paths (see .github/BRANCHING.md)
  PATH_ONLINE: shiritori-online/**
  PATH_KAWAII_RULES: kawaii-shiritori/firestore.rules
  PATH_KAWAII_INDEXES: kawaii-shiritori/firestore.indexes.json

jobs:
  # ---------------------------------------------------------------------------
  # Detect which apps/paths changed (skip deploy when unrelated files change)
  # ---------------------------------------------------------------------------
  changes:
    name: Detect path changes
    runs-on: ubuntu-latest
    outputs:
      online: ${{ steps.filter.outputs.online }}
      kawaii-rules: ${{ steps.filter.outputs.kawaii-rules }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            online:
              - 'shiritori-online/**'
            kawaii-rules:
              - 'kawaii-shiritori/firestore.rules'
              - 'kawaii-shiritori/firestore.indexes.json'
              - 'kawaii-shiritori/firebase.json'
            ci-config:
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/security-check.sh'

  # ---------------------------------------------------------------------------
  # Security scans (gates deploy)
  # ---------------------------------------------------------------------------
  security:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            shiritori-online/package-lock.json
            kawaii-shiritori/package-lock.json

      - name: Run security-check script
        run: chmod +x scripts/security-check.sh && bash scripts/security-check.sh

      - name: npm audit — shiritori-online (production)
        working-directory: shiritori-online
        run: |
          npm ci
          npm audit --omit=dev --audit-level=critical

      - name: npm audit — kawaii-shiritori (production)
        working-directory: kawaii-shiritori
        run: |
          npm ci
          npm audit --omit=dev --audit-level=critical

  json-validation:
    name: JSON Validation
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      
      - name: Validate JSON syntax
        run: |
          npm run validate:json
          echo "✅ All JSON files are valid" >> $GITHUB_STEP_SUMMARY
      
      - name: Check JSON formatting
        run: |
          npm run format:json:check
          echo "✅ All JSON files are properly formatted" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload JSON validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-validation-report
          path: |
            **/*.json
            !node_modules/**
            !dist/**
          retention-days: 30
          if-no-files-found: ignore

  format:
    name: Prettier
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shiritori-online/package-lock.json
            kawaii-shiritori/package-lock.json

      - run: npm ci
      - run: npm run format:check

      - name: shiritori-online format
        working-directory: shiritori-online
        run: npm ci && npm run format:check

      - name: kawaii-shiritori format
        working-directory: kawaii-shiritori
        run: npm ci && npm run format:check

  lint:
    name: ESLint — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [format, json-validation]
    strategy:
      fail-fast: false
      matrix:
        app: [shiritori-online, kawaii-shiritori]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - working-directory: ${{ matrix.app }}
        run: npm ci

      - name: ESLint
        working-directory: ${{ matrix.app }}
        run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: kawaii-shiritori/package-lock.json

      - working-directory: kawaii-shiritori
        run: npm ci

      - name: Vitest
        working-directory: kawaii-shiritori
        run: npm run test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-kawaii-shiritori
          path: kawaii-shiritori/coverage/
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Build — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [test, security]
    strategy:
      fail-fast: false
      matrix:
        app: [shiritori-online, kawaii-shiritori]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Production build
        working-directory: ${{ matrix.app }}
        run: npm run build

      - name: Build summary
        working-directory: ${{ matrix.app }}
        run: |
          echo "## Build — ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.app }}
          path: ${{ matrix.app }}/dist/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Production deploy (main only, path-filtered)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: [build, changes, security]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.online == 'true' ||
       needs.changes.outputs.kawaii-rules == 'true' ||
       needs.changes.outputs.ci-config == 'true' ||
       github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ env.LIVE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Download shiritori-online artifact
        if: needs.changes.outputs.online == 'true' || needs.changes.outputs.ci-config == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist-shiritori-online
          path: shiritori-online/dist

      - name: Deploy hosting + database
        if: needs.changes.outputs.online == 'true' || needs.changes.outputs.ci-config == 'true'
        working-directory: shiritori-online
        run: >
          npx firebase-tools@latest deploy
          --only hosting,database
          --project ${{ env.FIREBASE_PROJECT }}
          --non-interactive
          --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore rules
        if: needs.changes.outputs.kawaii-rules == 'true' || needs.changes.outputs.ci-config == 'true'
        working-directory: kawaii-shiritori
        run: >
          npx firebase-tools@latest deploy
          --only firestore
          --project ${{ env.FIREBASE_PROJECT }}
          --non-interactive
          --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment paths summary
        run: |
          echo "## Production deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ env.LIVE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **online changed**: ${{ needs.changes.outputs.online }}" >> $GITHUB_STEP_SUMMARY
          echo "- **firestore changed**: ${{ needs.changes.outputs.kawaii-rules }}" >> $GITHUB_STEP_SUMMARY
          echo "- **paths**: \`${{ env.PATH_ONLINE }}\`, firestore rules" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Staging preview (develop branch)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy staging preview
    runs-on: ubuntu-latest
    needs: [build, changes, security]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/develop' &&
      (needs.changes.outputs.online == 'true' || needs.changes.outputs.ci-config == 'true')
    outputs:
      preview_url: ${{ steps.preview.outputs.preview_url }}
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: actions/download-artifact@v4
        with:
          name: dist-shiritori-online
          path: shiritori-online/dist

      - name: Deploy preview channel
        id: preview
        working-directory: shiritori-online
        run: |
          OUTPUT=$(npx firebase-tools@latest hosting:channel:deploy develop \
            --project ${{ env.FIREBASE_PROJECT }} \
            --non-interactive \
            --token "$FIREBASE_TOKEN" \
            --expires 14d 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[^ ]+web\.app' | head -1)
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Staging URL
        run: |
          echo "## Staging preview" >> $GITHUB_STEP_SUMMARY
          echo "- **Channel**: develop (14 days)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.preview.outputs.preview_url }}" >> $GITHUB_STEP_SUMMARY

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: always() && (needs.deploy-production.result == 'success' || needs.deploy-staging.result == 'success')
    steps:
      - name: Set test URL
        id: url
        run: |
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "target=${{ env.LIVE_URL }}" >> $GITHUB_OUTPUT
          else
            echo "target=${{ needs.deploy-staging.outputs.preview_url }}" >> $GITHUB_OUTPUT
          fi

      - run: sleep 15

      - name: HTTP 200 + content
        run: |
          URL="${{ steps.url.outputs.target }}"
          echo "Testing $URL" >> $GITHUB_STEP_SUMMARY
          curl -fsSL -o /dev/null -w "HTTP %{http_code}\n" "$URL/"
          curl -fsSL "$URL/" | grep -q "しりとり"

      - name: Static assets
        run: |
          URL="${{ steps.url.outputs.target }}"
          JS=$(curl -fsSL "$URL/" | grep -oE 'assets/index-[^"]+\.js' | head -1)
          curl -fsSL -o /dev/null "$URL/$JS"
