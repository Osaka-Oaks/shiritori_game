name: CI Optimized

# High-performance CI with caching, parallelization, and smart skips
on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-opt-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "20"
  CACHE_VERSION: v1 # Increment to bust cache

jobs:
  # Fast path detection - determines what needs to run
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      online-app: ${{ steps.filter.outputs.online-app }}
      kawaii-app: ${{ steps.filter.outputs.kawaii-app }}
      shared: ${{ steps.filter.outputs.shared }}
      docs-only: ${{ steps.filter.outputs.docs-only }}
      deps: ${{ steps.filter.outputs.deps }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Only need last 2 commits for diff

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            online-app:
              - 'shiritori-online/src/**'
              - 'shiritori-online/public/**'
              - 'shiritori-online/index.html'
            kawaii-app:
              - 'kawaii-shiritori/src/**'
              - 'kawaii-shiritori/public/**'
              - 'kawaii-shiritori/index.html'
            shared:
              - 'shiritori-online/firebase.json'
              - 'shiritori-online/database.rules.json'
              - 'kawaii-shiritori/firestore.rules'
              - 'kawaii-shiritori/firestore.indexes.json'
            docs-only:
              - '**.md'
              - 'docs/**'
              - 'LICENSE'
            deps:
              - '**/package.json'
              - '**/package-lock.json'
            workflows:
              - '.github/workflows/**'

  # Ultra-fast security scan (parallel with other checks)
  security-fast:
    name: 🔒 Security (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: detect-changes
    if: needs.detect-changes.outputs.docs-only != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan (cached)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Quick security check
        run: |
          # Fast checks only
          chmod +x scripts/security-check.sh
          bash scripts/security-check.sh || echo "⚠️ Security warnings present"

  # JSON validation (very fast, always runs)
  validate-json:
    name: 📋 JSON
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: detect-changes
    if: needs.detect-changes.outputs.docs-only != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (cached)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root deps (cached)
        run: npm ci --prefer-offline

      - name: Validate & format check
        run: |
          npm run validate:json
          npm run format:json:check

  # Format check (fast, cached)
  format:
    name: ✨ Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: detect-changes
    if: needs.detect-changes.outputs.docs-only != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline
      - run: npm run format:check

  # Lint with dependency caching
  lint:
    name: 🔍 Lint - ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [detect-changes, format, validate-json]
    if: needs.detect-changes.outputs.docs-only != 'true'
    strategy:
      fail-fast: false
      matrix:
        app: [shiritori-online, kawaii-shiritori]
        # Skip if app didn't change
        exclude:
          - app: shiritori-online
            skip: ${{ needs.detect-changes.outputs.online-app != 'true' && needs.detect-changes.outputs.deps != 'true' }}
          - app: kawaii-shiritori
            skip: ${{ needs.detect-changes.outputs.kawaii-app != 'true' && needs.detect-changes.outputs.deps != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install deps (cached)
        working-directory: ${{ matrix.app }}
        run: npm ci --prefer-offline --no-audit

      - name: Lint
        working-directory: ${{ matrix.app }}
        run: npm run lint

      - name: Type check (cached)
        working-directory: ${{ matrix.app }}
        run: npx tsc --noEmit --incremental

  # Tests with coverage caching
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: [detect-changes, lint]
    if: |
      needs.detect-changes.outputs.docs-only != 'true' &&
      needs.detect-changes.outputs.kawaii-app == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: kawaii-shiritori/package-lock.json

      - name: Install deps (cached)
        working-directory: kawaii-shiritori
        run: npm ci --prefer-offline --no-audit

      - name: Run tests
        working-directory: kawaii-shiritori
        run: npm test -- --run --reporter=verbose

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: kawaii-shiritori/coverage/
          retention-days: 7
          compression-level: 9

  # Build with aggressive caching
  build:
    name: 🏗️ Build - ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect-changes, lint]
    if: needs.detect-changes.outputs.docs-only != 'true'
    strategy:
      fail-fast: false
      matrix:
        app: [shiritori-online, kawaii-shiritori]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      # Cache Vite build artifacts
      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.app }}/node_modules/.vite
            ${{ matrix.app }}/.vite
          key: vite-${{ env.CACHE_VERSION }}-${{ matrix.app }}-${{ hashFiles(format('{0}/src/**', matrix.app)) }}
          restore-keys: |
            vite-${{ env.CACHE_VERSION }}-${{ matrix.app }}-

      - name: Install deps (cached)
        working-directory: ${{ matrix.app }}
        run: npm ci --prefer-offline --no-audit

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
        env:
          # Optimize build
          NODE_ENV: production
          CI: true

      - name: Compress build
        working-directory: ${{ matrix.app }}
        run: tar -czf dist.tar.gz dist/

      - name: Upload build artifact (compressed)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.app }}
          path: ${{ matrix.app }}/dist.tar.gz
          retention-days: 7
          compression-level: 0 # Already compressed

  # Deploy only if on main and relevant changes
  deploy-online:
    name: 🚀 Deploy Online
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [detect-changes, security-fast, build]
    if: |
      github.ref == 'refs/heads/main' &&
      (needs.detect-changes.outputs.online-app == 'true' || 
       needs.detect-changes.outputs.shared == 'true')
    environment:
      name: production-online
      url: https://shiritori-game-ccaae.web.app
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: dist-shiritori-online
          path: .

      - name: Extract build
        run: |
          mkdir -p shiritori-online/dist
          tar -xzf dist.tar.gz -C shiritori-online/

      - name: Deploy to Firebase
        working-directory: shiritori-online
        run: |
          npx firebase-tools@latest deploy \
            --only hosting,database \
            --project shiritori-game-ccaae \
            --non-interactive \
            --token "${{ secrets.FIREBASE_TOKEN }}"

  # Deploy Firestore rules (very fast)
  deploy-rules:
    name: 🔒 Deploy Rules
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [detect-changes, security-fast]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.shared == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules
        working-directory: kawaii-shiritori
        run: |
          npx firebase-tools@latest deploy \
            --only firestore \
            --project shiritori-game-ccaae \
            --non-interactive \
            --token "${{ secrets.FIREBASE_TOKEN }}"

  # Health check (parallel with deploy)
  health-check:
    name: 💓 Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [deploy-online]
    if: always() && needs.deploy-online.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 15

      - name: Quick health check
        run: |
          URL="https://shiritori-game-ccaae.web.app"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)
          if [ "$STATUS" -eq 200 ]; then
            echo "✅ Site is up (HTTP $STATUS)"
          else
            echo "❌ Site issue (HTTP $STATUS)"
            exit 1
          fi

  # Summary job
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [detect-changes, security-fast, validate-json, format, lint, build]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 🎯 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "- Online app: ${{ needs.detect-changes.outputs.online-app }}" >> $GITHUB_STEP_SUMMARY
          echo "- Kawaii app: ${{ needs.detect-changes.outputs.kawaii-app }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docs only: ${{ needs.detect-changes.outputs.docs-only }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security-fast.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- JSON: ${{ needs.validate-json.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Format: ${{ needs.format.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
