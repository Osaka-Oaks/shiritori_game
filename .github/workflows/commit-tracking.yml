name: Commit Tracking & Monitoring

# Track every commit, file change, and deployment
on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]
  deployment_status:

permissions:
  contents: write
  issues: write
  pull-requests: write
  deployments: write
  statuses: write

jobs:
  track-commit:
    name: 📝 Track Commit Details
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Analyze commit
        id: analyze
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            
            // Get commit details
            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: sha
            });
            
            // Extract info
            const author = commit.commit.author.name;
            const message = commit.commit.message;
            const filesChanged = commit.files.length;
            const additions = commit.stats.additions;
            const deletions = commit.stats.deletions;
            const total = commit.stats.total;
            
            // Categorize files
            const filesByType = {};
            for (const file of commit.files) {
              const ext = file.filename.split('.').pop();
              filesByType[ext] = (filesByType[ext] || 0) + 1;
            }
            
            // Create detailed summary
            const summary = `## 📝 Commit Analysis
            
            **SHA**: \`${sha.substring(0, 7)}\`
            **Author**: ${author}
            **Branch**: \`${context.ref.replace('refs/heads/', '')}\`
            
            ### Changes
            - **Files**: ${filesChanged}
            - **Additions**: +${additions}
            - **Deletions**: -${deletions}
            - **Total**: ${total} lines
            
            ### Files by Type
            ${Object.entries(filesByType).map(([ext, count]) => `- \`${ext}\`: ${count} file(s)`).join('\n')}
            
            ### Modified Files
            ${commit.files.slice(0, 10).map(f => `- \`${f.filename}\` (+${f.additions}/-${f.deletions})`).join('\n')}
            ${commit.files.length > 10 ? `\n*...and ${commit.files.length - 10} more*` : ''}
            
            ### Commit Message
            \`\`\`
            ${message}
            \`\`\`
            `;
            
            console.log(summary);
            core.summary.addRaw(summary).write();
            
            // Set outputs
            core.setOutput('filesChanged', filesChanged);
            core.setOutput('additions', additions);
            core.setOutput('deletions', deletions);
            core.setOutput('author', author);

      - name: Create commit badge
        run: |
          mkdir -p .github/badges
          
          FILES="${{ steps.analyze.outputs.filesChanged }}"
          ADDITIONS="${{ steps.analyze.outputs.additions }}"
          DELETIONS="${{ steps.analyze.outputs.deletions }}"
          
          echo "![Files](https://img.shields.io/badge/files-${FILES}-blue)" > .github/badges/last-commit.md
          echo "![Changes](https://img.shields.io/badge/changes-+${ADDITIONS}_--${DELETIONS}-green)" >> .github/badges/last-commit.md

  track-file-changes:
    name: 📊 Track File Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate change report
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // Get recent commits (last 24 hours)
            const yesterday = new Date(Date.now() - 24 * 60 * 60 * 1000);
            const { data: commits } = await github.rest.repos.listCommits({
              owner,
              repo,
              since: yesterday.toISOString(),
              per_page: 100
            });
            
            // Track file changes
            const fileChanges = new Map();
            let totalAdditions = 0;
            let totalDeletions = 0;
            
            for (const commit of commits) {
              const { data: detail } = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: commit.sha
              });
              
              for (const file of detail.files) {
                if (!fileChanges.has(file.filename)) {
                  fileChanges.set(file.filename, {
                    changes: 0,
                    additions: 0,
                    deletions: 0,
                    commits: 0
                  });
                }
                const stats = fileChanges.get(file.filename);
                stats.changes += file.changes;
                stats.additions += file.additions;
                stats.deletions += file.deletions;
                stats.commits += 1;
              }
              
              totalAdditions += detail.stats.additions;
              totalDeletions += detail.stats.deletions;
            }
            
            // Sort by most changed
            const sortedFiles = Array.from(fileChanges.entries())
              .sort((a, b) => b[1].changes - a[1].changes)
              .slice(0, 20);
            
            const report = `## 📊 24-Hour Change Report
            
            **Period**: ${yesterday.toISOString().split('T')[0]} to ${new Date().toISOString().split('T')[0]}
            **Commits**: ${commits.length}
            **Total Changes**: +${totalAdditions}/-${totalDeletions}
            
            ### Most Changed Files
            | File | Changes | Commits |
            |------|---------|---------|
            ${sortedFiles.map(([file, stats]) => 
              `| \`${file}\` | +${stats.additions}/-${stats.deletions} | ${stats.commits} |`
            ).join('\n')}
            
            ### Active Contributors
            ${Array.from(new Set(commits.map(c => c.commit.author.name)))
              .map(author => `- ${author}`)
              .join('\n')}
            `;
            
            core.summary.addRaw(report).write();
            console.log(report);

  monitor-branch-health:
    name: 🏥 Monitor Branch Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check branch status
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            
            // Get branch protection
            let protected = false;
            try {
              await github.rest.repos.getBranchProtection({ owner, repo, branch });
              protected = true;
            } catch (e) {
              protected = false;
            }
            
            // Get commit status
            const { data: statuses } = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: branch
            });
            
            // Get recent commits
            const { data: commits } = await github.rest.repos.listCommits({
              owner,
              repo,
              sha: branch,
              per_page: 10
            });
            
            // Calculate health score
            const passRate = statuses.statuses.filter(s => s.state === 'success').length / Math.max(statuses.statuses.length, 1);
            const health = passRate > 0.9 ? '🟢 Healthy' : passRate > 0.7 ? '🟡 Fair' : '🔴 Needs Attention';
            
            const report = `## 🏥 Branch Health: \`${branch}\`
            
            **Status**: ${health}
            **Protected**: ${protected ? '🔒 Yes' : '⚠️ No'}
            **Recent Commits**: ${commits.length}
            **Check Pass Rate**: ${(passRate * 100).toFixed(0)}%
            
            ### Recent Checks
            ${statuses.statuses.slice(0, 5).map(s => 
              `- ${s.state === 'success' ? '✅' : s.state === 'pending' ? '🔄' : '❌'} ${s.context}`
            ).join('\n') || '- No checks yet'}
            
            ### Latest Commits
            ${commits.slice(0, 5).map(c => 
              `- \`${c.sha.substring(0, 7)}\` ${c.commit.message.split('\n')[0]}`
            ).join('\n')}
            `;
            
            core.summary.addRaw(report).write();
            
            // Create status badge
            const color = passRate > 0.9 ? 'brightgreen' : passRate > 0.7 ? 'yellow' : 'red';
            console.log(`Branch ${branch}: ${health} (${(passRate * 100).toFixed(0)}% pass rate)`);

  track-deployment:
    name: 🚀 Track Deployment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Record deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const branch = context.ref.replace('refs/heads/', '');
            const env = branch === 'main' ? 'production' : 'staging';
            
            // Create deployment
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: sha,
              environment: env,
              auto_merge: false,
              required_contexts: []
            });
            
            console.log(`Created deployment ${deployment.id} for ${env}`);
            
            // Set deployment status to in_progress
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: deployment.id,
              state: 'in_progress',
              description: 'Deployment started'
            });
            
            // Log deployment
            const log = `## 🚀 Deployment Initiated
            
            **Environment**: ${env}
            **SHA**: \`${sha.substring(0, 7)}\`
            **Branch**: \`${branch}\`
            **Time**: ${new Date().toISOString()}
            **Deployment ID**: ${deployment.id}
            `;
            
            core.summary.addRaw(log).write();

  feature-status:
    name: 🎯 Feature Status Check
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/feature/')
    steps:
      - uses: actions/checkout@v4

      - name: Analyze feature progress
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const feature = branch.replace('feature/', '');
            
            // Get commits on this branch
            const { data: comparison } = await github.rest.repos.compareCommits({
              owner,
              repo,
              base: 'develop',
              head: branch
            });
            
            const commits = comparison.commits.length;
            const filesChanged = comparison.files.length;
            const additions = comparison.commits.reduce((sum, c) => sum + (c.stats?.additions || 0), 0);
            const deletions = comparison.commits.reduce((sum, c) => sum + (c.stats?.deletions || 0), 0);
            
            // Check if PR exists
            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: 'open'
            });
            
            const hasPR = prs.length > 0;
            const prNumber = hasPR ? prs[0].number : null;
            
            const status = `## 🎯 Feature Status: \`${feature}\`
            
            **Branch**: \`${branch}\`
            **Progress**: ${hasPR ? '🔄 In Review' : '🚧 In Development'}
            ${hasPR ? `**PR**: #${prNumber}` : ''}
            
            ### Statistics
            - **Commits**: ${commits}
            - **Files Changed**: ${filesChanged}
            - **Lines**: +${additions}/-${deletions}
            
            ### Ready for Review?
            ${hasPR ? '✅ PR is open' : '⚠️ No PR yet - create one when ready'}
            
            ### Next Steps
            ${hasPR 
              ? '- Wait for code review\n- Address feedback\n- Merge when approved' 
              : '- Complete development\n- Test locally\n- Create pull request'}
            `;
            
            core.summary.addRaw(status).write();
            console.log(status);

  log-activity:
    name: 📜 Log All Activity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create activity log
        run: |
          mkdir -p .github/logs
          
          cat > .github/logs/activity-$(date +%Y%m%d).log << EOF
          ================================================
          ACTIVITY LOG - $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          ================================================
          
          Repository: ${{ github.repository }}
          Event: ${{ github.event_name }}
          Ref: ${{ github.ref }}
          SHA: ${{ github.sha }}
          Actor: ${{ github.actor }}
          
          Workflow: ${{ github.workflow }}
          Run ID: ${{ github.run_id }}
          Run Number: ${{ github.run_number }}
          
          ================================================
          EOF
          
          cat .github/logs/activity-$(date +%Y%m%d).log

      - name: Upload activity log
        uses: actions/upload-artifact@v4
        with:
          name: activity-log-${{ github.run_number }}
          path: .github/logs/
          retention-days: 90
