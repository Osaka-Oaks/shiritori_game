name: Cron jobs

# Scheduled maintenance: weekly digest, workflow health, label sync.
on:
  schedule:
    - cron: "0 8 * * 1" # Monday 08:00 UTC — weekly digest
    - cron: "0 9 1 * *" # 1st of month 09:00 UTC — monthly report
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run
        required: true
        default: digest
        type: choice
        options:
          - digest
          - workflow-health
          - sync-labels

permissions:
  contents: read

jobs:
  weekly-digest:
    name: Weekly work digest
    if: github.event.schedule == '0 8 * * 1' || (github.event_name == 'workflow_dispatch' && inputs.job == 'digest')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100,
            });
            const issues = open.filter(i => !i.pull_request);

            const byStatus = {};
            for (const i of issues) {
              const status = i.labels.find(l => l.name.startsWith('status:'))?.name ?? 'status: (none)';
              byStatus[status] = (byStatus[status] || 0) + 1;
            }

            const lines = Object.entries(byStatus)
              .sort((a, b) => b[1] - a[1])
              .map(([s, n]) => `- ${s}: ${n}`);

            const high = issues.filter(i => i.labels.some(l => l.name === 'priority: high'));
            const body = [
              '# 📋 Weekly work digest',
              '',
              `**Open issues:** ${issues.length}`,
              '',
              '## By status',
              ...lines,
              '',
              high.length ? `## 🔴 High priority (${high.length})` : '',
              ...high.map(i => `- #${i.number} ${i.title}`),
              '',
              '_Auto-generated by cron-jobs workflow._',
            ].filter(Boolean).join('\n');

            const title = `📋 Weekly digest — ${new Date().toISOString().slice(0, 10)}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'action: cron',
            });
            const prev = existing.find(i => i.title.startsWith('📋 Weekly digest'));
            if (prev) {
              await github.rest.issues.createComment({ owner, repo, issue_number: prev.number, body });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body,
                labels: ['type: chore', 'action: cron', 'status: triage'],
              });
            }

  workflow-health:
    name: Workflow health check
    if: github.event.schedule == '0 9 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'workflow-health')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, per_page: 50, created: `>=${since}`,
            });

            const failed = runs.workflow_runs.filter(r => r.conclusion === 'failure');
            if (failed.length === 0) {
              core.info('No failed workflow runs in the last 7 days');
              return;
            }

            const summary = failed.slice(0, 10).map(r =>
              `- [${r.name}](${r.html_url}) — ${r.head_branch} @ ${r.head_sha?.slice(0, 7)}`
            ).join('\n');

            const title = '🚨 Workflow failures (last 7 days)';
            const body = `Automated monthly health check found **${failed.length}** failed run(s):\n\n${summary}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'action: ci',
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body,
                labels: ['type: bug', 'action: ci', 'priority: medium', 'status: triage'],
              });
            }

  sync-labels-cron:
    name: Sync labels (monthly)
    if: github.event.schedule == '0 9 1 * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'sync-labels')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
