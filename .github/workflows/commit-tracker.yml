name: Commit tracker

# Links pushes to issues via #123 / Fixes #123 in commit messages.
# Posts a comment on each referenced issue with commit SHA and branch.
on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]

permissions:
  contents: read

jobs:
  track:
    name: Link commits to issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comment on linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const before = context.payload.before;
            const after = context.payload.after;

            if (before === '0000000000000000000000000000000000000000') {
              core.info('Initial push — skipping');
              return;
            }

            const { data: compare } = await github.rest.repos.compareCommits({
              owner, repo, base: before, head: after,
            });

            const issueNums = new Set();
            for (const commit of compare.commits || []) {
              const msg = commit.commit.message || '';
              const matches = msg.matchAll(/#(\d+)/g);
              for (const m of matches) issueNums.add(parseInt(m[1], 10));
            }

            if (issueNums.size === 0) {
              core.info('No issue references in commits');
              return;
            }

            for (const num of issueNums) {
              const commits = (compare.commits || [])
                .filter(c => (c.commit.message || '').includes(`#${num}`))
                .map(c => `- [\`${c.sha.slice(0, 7)}\`](${c.html_url}) ${c.commit.message.split('\n')[0]}`)
                .join('\n');

              const body = [
                `📌 **Commit tracker** — push to \`${branch}\``,
                '',
                commits,
                '',
                `[View compare](https://github.com/${owner}/${repo}/compare/${before}...${after})`,
              ].join('\n');

              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: num, body,
                });
                const issue = await github.rest.issues.get({ owner, repo, issue_number: num });
                const labels = issue.data.labels.map(l => l.name);
                if (!labels.some(l => l.startsWith('status:'))) {
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: num,
                    labels: ['status: in progress'],
                  });
                }
              } catch (e) {
                core.warning(`Could not comment on #${num}: ${e.message}`);
              }
            }
