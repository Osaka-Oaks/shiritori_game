<script>
        // Simple avatar selection logic
        document.addEventListener('DOMContentLoaded', () => {
            const options = document.querySelectorAll('.avatar-option');
            const previewImage = document.getElementById('main-avatar-preview');

            options.forEach(option => {
                option.addEventListener('click', function() {
                    // Remove selected state from all
                    options.forEach(opt => {
                        opt.classList.remove('border-primary');
                        opt.classList.add('border-transparent');
                        
                        // Remove checkmark if exists
                        const checkmark = opt.querySelector('.bg-primary');
                        if(checkmark) checkmark.remove();
                    });

                    // Add selected state to clicked
                    this.classList.remove('border-transparent');
                    this.classList.add('border-primary');
                    
                    // Add checkmark
                    const checkHTML = `
                        <div class="absolute top-2 right-2 bg-primary text-on-primary rounded-full w-6 h-6 flex items-center justify-center shadow-sm checkmark-anim">
                            <span class="material-symbols-outlined text-sm font-bold" style="font-variation-settings: 'wght' 700;">check</span>
                        </div>
                    `;
                    this.insertAdjacentHTML('beforeend', checkHTML);

                    // Update preview
                    const newSrc = this.getAttribute('data-src');
                    
                    // Small pop animation for preview
                    previewImage.parentElement.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        previewImage.src = newSrc;
                        previewImage.parentElement.style.transform = 'scale(1.05)';
                        setTimeout(() => {
                            previewImage.parentElement.style.transform = 'scale(1)';
                        }, 150);
                    }, 100);
                });
            });
        });
    </script>
