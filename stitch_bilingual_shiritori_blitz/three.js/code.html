<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_12 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_12" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_12');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
camera.position.set(0, 12, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
directionalLight.position.set(5, 10, 7);
scene.add(directionalLight);

// Board Colors (Kawaii Palette)
const colors = {
  primary: 0xff94b4,
  secondary: 0xe0d5f6,
  accent: 0xa7f3d0,
  board: 0xfdf7ff,
  tile: 0xffffff
};

// Create the Board (Monopoly style 5x5 grid for mobile)
const boardSize = 5;
const tileSize = 2;
const boardPadding = 0.2;

const boardGroup = new THREE.Group();

for (let i = 0; i < boardSize; i++) {
  for (let j = 0; j < boardSize; j++) {
    // Only build the perimeter for a Monopoly feel
    if (i === 0 || i === boardSize - 1 || j === 0 || j === boardSize - 1) {
      const tileGeom = new THREE.BoxGeometry(tileSize - boardPadding, 0.5, tileSize - boardPadding);
      const tileMat = new THREE.MeshPhongMaterial({ 
        color: (i + j) % 2 === 0 ? colors.tile : colors.secondary,
        flatShading: true
      });
      const tile = new THREE.Mesh(tileGeom, tileMat);
      tile.position.set(
        (i - (boardSize - 1) / 2) * tileSize,
        0,
        (j - (boardSize - 1) / 2) * tileSize
      );
      boardGroup.add(tile);
      
      // Add a little colored "property" stripe on top
      const stripeGeom = new THREE.BoxGeometry(tileSize - boardPadding, 0.1, (tileSize - boardPadding) * 0.2);
      const stripeMat = new THREE.MeshPhongMaterial({ color: colors.primary });
      const stripe = new THREE.Mesh(stripeGeom, stripeMat);
      stripe.position.set(tile.position.x, 0.3, tile.position.z + (tileSize/2 - 0.2));
      boardGroup.add(stripe);
    }
  }
}
scene.add(boardGroup);

// Character 1: Neko (Pink)
const characterGroup = new THREE.Group();
const bodyGeom = new THREE.SphereGeometry(0.5, 32, 32);
const bodyMat = new THREE.MeshPhongMaterial({ color: colors.primary });
const body = new THREE.Mesh(bodyGeom, bodyMat);
characterGroup.add(body);

const earGeom = new THREE.ConeGeometry(0.2, 0.4, 3);
const earMat = new THREE.MeshPhongMaterial({ color: colors.primary });
const leftEar = new THREE.Mesh(earGeom, earMat);
leftEar.position.set(-0.3, 0.5, 0);
leftEar.rotation.z = 0.3;
characterGroup.add(leftEar);

const rightEar = new THREE.Mesh(earGeom, earMat);
rightEar.position.set(0.3, 0.5, 0);
rightEar.rotation.z = -0.3;
characterGroup.add(rightEar);

characterGroup.position.set(-4, 0.7, 4); // Starting position
scene.add(characterGroup);

// Power-up item (Rotating Diamond)
const powerUpGeom = new THREE.OctahedronGeometry(0.4);
const powerUpMat = new THREE.MeshPhongMaterial({ color: colors.accent, emissive: colors.accent, emissiveIntensity: 0.5 });
const powerUp = new THREE.Mesh(powerUpGeom, powerUpMat);
powerUp.position.set(4, 1.2, -4);
scene.add(powerUp);

// Floating Animation Loop
function animate() {
  requestAnimationFrame(animate);
  
  const time = Date.now() * 0.001;
  
  // Float character
  characterGroup.position.y = 0.7 + Math.sin(time * 3) * 0.1;
  
  // Rotate board slightly for depth
  boardGroup.rotation.y = Math.sin(time * 0.2) * 0.05;
  
  // Rotate powerup
  powerUp.rotation.y += 0.02;
  powerUp.position.y = 1.2 + Math.cos(time * 2) * 0.2;
  
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const newWidth = container.clientWidth || window.innerWidth;
  const newHeight = container.clientHeight || window.innerHeight;
  camera.aspect = newWidth / newHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(newWidth, newHeight);
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_12 -->
</body>
</html>
