    <!-- Ambient Background -->

    <!-- TopAppBar -->
    <!-- Note: Top nav is hidden on mobile, full nav cluster shown on desktop. For this specific Oops feedback screen (transactional/linear), the instruction says "Automatic Suppression: You MUST exclude the navigation shell if the page intent is Linear/Transactional... However, the prompt EXPLICITLY asks: 'Includes a primary action button 'Try Again' and the shared navigation components.' -->
    <!-- I will follow the explicit prompt instruction to include the shared navigation components, despite the semantic shell mandate suggesting suppression, as specific prompt instructions override general rules. Wait, Source of Truth says: Contextual State & Identity logic. Actually, an "Oops" screen is an error/feedback screen. "Relevance Check: If the page content (e.g., "Privacy Policy" or "Error 404") does not logically sit under the categories defined in the JSON, suppress the navigation to prioritize the content canvas." -->
    <!-- However, the prompt literally says "Includes a primary action button 'Try Again' and the shared navigation components." I will include them to satisfy the prompt. -->
    <header
      class="w-full top-0 bg-surface dark:bg-background z-50 flex justify-between items-center px-container-margin py-unit w-full max-w-full hidden md:flex"
    >

        class="text-on-surface-variant dark:text-outline hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-transform active:scale-95 duration-200 p-2 rounded-full"

      >
        <span class="material-symbols-outlined text-2xl">settings</span>

    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-1 w-full max-w-md mx-auto flex flex-col items-center justify-center px-container-margin py-12 relative z-10"
    >
      <!-- Glassmorphism Card for Oops State -->
      <div
        class="bg-surface-container-lowest/80 backdrop-blur-md w-full rounded-xl p-8 flex flex-col items-center text-center shadow-[0_8px_32px_rgba(152,65,94,0.1)] border border-surface-variant"

          />

        <!-- Feedback Text -->

          MADA MADA...

        <p class="font-body-lg text-body-lg text-on-surface-variant mb-8 px-4">
          That word doesn't work! Try another one.

        <!-- Primary Action Button -->

        >
          <span class="material-symbols-outlined">refresh</span>
          Try Again
        </a>
      </div>
    </main>
    <!-- BottomNavBar (Mobile Only) -->
    <!-- Active state semantic matching: Since this is playing the game (trying a word), "Play" is the closest logical match. -->
    <nav
