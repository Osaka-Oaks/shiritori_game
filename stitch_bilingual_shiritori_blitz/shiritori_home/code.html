<script>
        // Floating Kana Animation logic
        const kana = ['あ', 'い', 'う', 'え', 'お', 'か', 'き', 'く', 'け', 'こ', 'さ', 'し', 'す', 'せ', 'そ', 'た', 'ち', 'つ', 'て', 'と', 'な', 'に', 'ぬ', 'ね', 'の', 'は', 'ひ', 'ふ', 'へ', 'ほ', 'ま', 'み', 'む', 'め', 'も', 'や', 'ゆ', 'よ', 'ら', 'り', 'る', 'れ', 'ろ', 'わ', 'を', 'ん'];
        const bg = document.getElementById('floating-bg');
        const count = 25;

        for (let i = 0; i < count; i++) {
            const span = document.createElement('span');
            span.className = 'kana-float font-display-game text-2xl md:text-4xl';
            span.innerText = kana[Math.floor(Math.random() * kana.length)];
            
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            const delay = Math.random() * 10;
            const duration = 10 + Math.random() * 20;
            
            span.style.left = `${left}%`;
            span.style.top = `${top}%`;
            span.style.animation = `float ${duration}s ease-in-out infinite`;
            span.style.animationDelay = `-${delay}s`;
            
            bg.appendChild(span);
        }

        // Dark mode simulation toggle (optional helper for debugging)
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
