name: shiritori_flutter
description: "Bilingual Shiritori — Flutter cross-platform with 2D/3D game modes"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  # UI & Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2801.0
  
  # Firebase (keep existing working versions)
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_database: ^12.4.4
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.6.2
  
  # 2D Game Engine
  flame: ^1.22.0
  flame_forge2d: ^0.18.0+1
  flame_audio: ^2.11.0
  
  # 3D Graphics
  flutter_cube: ^0.1.1
  vector_math: ^2.1.4
  
  # Animations
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  
  # UI Components
  flutter_hooks: ^0.20.5
  gap: ^3.0.1
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  
  # Internationalization
  intl: ^0.20.0
  
  # Persistence
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Networking
  dio: ^5.7.0
  
  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
    
  # Linting
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13
  
  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  
  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  
  # Assets will be added when needed
  # assets:
  #   - assets/images/
  #   - assets/audio/
  #   - assets/lottie/
  #   - assets/models/
