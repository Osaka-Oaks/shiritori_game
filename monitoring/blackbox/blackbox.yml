modules:
  # Standard probe: healthy on HTTP 2xx.
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      fail_if_not_ssl: true
      preferred_ip_protocol: ip4

  # RTDB is healthy when reachable AND locked down: 401 (auth required) or 200.
  http_up_or_401:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: [200, 401]
      method: GET
      fail_if_not_ssl: true
      preferred_ip_protocol: ip4
