# Logstash Pipeline Configuration for Shiritori Game

input {
  # Filebeat input
  beats {
    port => 5044
    tags => ["beats"]
  }

  # TCP input for application logs
  tcp {
    port => 5000
    codec => json
    tags => ["tcp"]
  }

  # UDP input for high-volume logs
  udp {
    port => 5000
    codec => json
    tags => ["udp"]
  }

  # HTTP input for webhooks
  http {
    port => 8080
    tags => ["http", "webhook"]
  }

  # Syslog input
  syslog {
    port => 5514
    tags => ["syslog"]
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Parse application logs
  if [tags] {
    if "app" in [tags] {
      grok {
        match => {
          "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} - %{GREEDYDATA:log_message}"
        }
      }

      date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
      }

      mutate {
        add_field => {
          "app" => "shiritori-game"
          "environment" => "%{[parsed][env]}"
        }
      }
    }
  }

  # Parse Firebase logs
  if [source] =~ /firebase/ {
    mutate {
      add_tag => ["firebase"]
    }

    if [message] =~ /firestore/ {
      grok {
        match => {
          "message" => "Firestore %{WORD:operation} - Collection: %{DATA:collection}, Doc: %{DATA:document_id}"
        }
      }
    }
  }

  # Parse build logs
  if [source] =~ /github-actions/ or [source] =~ /ci/ {
    mutate {
      add_tag => ["build", "ci"]
    }

    if [message] =~ /Build (completed|failed)/ {
      grok {
        match => {
          "message" => "Build %{WORD:build_status} in %{NUMBER:build_duration:float}s"
        }
      }

      mutate {
        convert => {
          "build_duration" => "float"
        }
      }
    }
  }

  # Parse HTTP access logs
  if [type] == "nginx" or [type] == "apache" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - - \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{URIPATHPARAM:request_uri} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code:int} %{NUMBER:bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
    }

    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    geoip {
      source => "client_ip"
      target => "geoip"
    }

    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }
  }

  # Parse error logs
  if [level] == "ERROR" or [level] == "FATAL" {
    mutate {
      add_tag => ["error"]
      add_field => {
        "severity" => "high"
      }
    }
  }

  # Parse performance metrics
  if [message] =~ /duration|latency|response_time/ {
    grok {
      match => {
        "message" => "(%{WORD:metric_type}|Response time): %{NUMBER:duration:float}(ms|s)"
      }
    }

    if [duration] {
      mutate {
        convert => {
          "duration" => "float"
        }
      }
    }
  }

  # Parse game events
  if [message] =~ /game_/ {
    grok {
      match => {
        "message" => "game_%{WORD:game_event} - Player: %{DATA:player_id}, Word: %{DATA:word}"
      }
    }

    mutate {
      add_tag => ["game_event"]
    }
  }

  # Enrich with metadata
  mutate {
    add_field => {
      "index_date" => "%{+YYYY.MM.dd}"
      "processed_at" => "%{@timestamp}"
    }
  }

  # Remove unwanted fields
  mutate {
    remove_field => ["agent", "ecs", "host", "input", "log"]
  }

  # Anonymize PII
  if [user_email] {
    mutate {
      gsub => [
        "user_email", "^(.{3}).*(@.*)$", "\1***\2"
      ]
    }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "shiritori-logs-%{index_date}"
    
    # Index lifecycle management
    ilm_enabled => true
    ilm_rollover_alias => "shiritori-logs"
    ilm_pattern => "000001"
    ilm_policy => "shiritori-lifecycle-policy"
  }

  # Separate indices for different log types
  if "error" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "shiritori-errors-%{index_date}"
    }
  }

  if "build" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "shiritori-builds-%{index_date}"
    }
  }

  if "game_event" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "shiritori-game-events-%{index_date}"
    }
  }

  # Output to stdout for debugging (disable in production)
  # stdout {
  #   codec => rubydebug
  # }

  # Send critical errors to alerting system
  if [severity] == "high" {
    http {
      url => "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
      http_method => "post"
      format => "json"
      content_type => "application/json"
      mapping => {
        "text" => "🚨 Critical Error: %{message}"
        "channel" => "#alerts"
      }
    }
  }

  # Send metrics to StatsD/Datadog
  if [metric_type] {
    statsd {
      host => "datadog-agent"
      port => 8125
      namespace => "shiritori"
      sender => "%{host}"
      increment => ["%{metric_type}.count"]
      timing => ["%{metric_type}.duration", "%{duration}"]
    }
  }

  # Send build metrics
  if [build_status] {
    statsd {
      host => "datadog-agent"
      port => 8125
      namespace => "shiritori.ci"
      increment => ["build.%{build_status}"]
      timing => ["build.duration", "%{build_duration}"]
    }
  }
}
