name: shiritori_flutter
description: Cross-platform Shiritori word chain game with Firebase integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_analytics: ^10.7.0
  firebase_performance: ^0.9.3

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Navigation
  go_router: ^12.1.0

  # Utilities
  collection: ^1.18.0
  uuid: ^4.2.0
  intl: ^0.19.0
  equatable: ^2.0.5

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0

  # Audio
  audioplayers: ^5.2.0

  # Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^3.0.0
  very_good_analysis: ^5.1.0

  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  riverpod_generator: ^2.3.0

  # Testing
  mockito: ^5.4.4
  fake_cloud_firestore: ^2.4.10

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/sounds/
    - assets/fonts/
    - assets/data/

  # Fonts
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
        - asset: assets/fonts/NotoSansJP-Bold.ttf
          weight: 700

# Platform-specific configuration
flutter:
  # Web
  web:
    canvaskit:
      renderer: html

  # Desktop
  desktop:
    windows:
      icon: assets/icon.ico
    macos:
      icon: assets/icon.icns
    linux:
      icon: assets/icon.png
