title: Shiritori Game Documentation
description: Comprehensive documentation for the Shiritori Game multiplayer project - React, Flutter, Firebase, and CI/CD
theme: jekyll-theme-cayman
baseurl: /shiritori_game
url: https://jorelfuji.github.io
markdown: kramdown
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings

# Navigation
navigation:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Security
    url: /security/
  - title: Deployment
    url: /deployment/
  - title: Build
    url: /build/
  - title: Monitoring
    url: /monitoring/

# Collections
collections:
  guides:
    output: true
    permalink: /:collection/:name

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
      author: JorelFuji

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
